#
# Harness-only overrides for CI integration tests.
#
# 1. Bind loopback ports so the test runner can reach services.
# 2. Blank OTEL to prevent retry-latency against a missing collector.
# 3. Disable Docker health checks on Node services — the harness script
#    does its own wait_for_service_health loop with proper log dumps.
#    Docker health checks cause cascading "dependency failed to start"
#    errors when any single service is slow to boot on ARM CI runners.
#
x-no-telemetry: &no-telemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

x-no-healthcheck: &no-healthcheck
  test: ["NONE"]

services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  opensearch:
    ports:
      - "127.0.0.1:${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "127.0.0.1:${OPENSEARCH_PERF_PORT:-9600}:9600"

  minio:
    ports:
      - "127.0.0.1:${MINIO_PORT:-9900}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9901}:9001"

  notification-service:
    ports:
      - "127.0.0.1:4010:4010"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  profile-project-service:
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  identity-service:
    ports:
      - "127.0.0.1:4005:4005"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  search-indexer-service:
    ports:
      - "127.0.0.1:4003:4003"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      opensearch:
        condition: service_healthy

  competition-directory-service:
    ports:
      - "127.0.0.1:4002:4002"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  script-storage-service:
    ports:
      - "127.0.0.1:4011:4011"
    environment:
      <<: *no-telemetry
      STORAGE_UPLOAD_BASE_URL: "http://localhost:${MINIO_PORT:-9900}"
      STORAGE_PUBLIC_BASE_URL: "http://localhost:${MINIO_PORT:-9900}"
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  submission-tracking-service:
    ports:
      - "127.0.0.1:4004:4004"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  feedback-exchange-service:
    ports:
      - "127.0.0.1:4006:4006"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  ranking-service:
    ports:
      - "127.0.0.1:4007:4007"
