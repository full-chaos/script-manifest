#
# Harness-only host bindings.
# Keep the main dev compose aligned with Traefik/public-vs-internal routing,
# and let the integration harness opt back into loopback ports for tests.
#
# The harness does NOT start signoz-collection-agent, so we blank out
# OTEL_EXPORTER_OTLP_ENDPOINT to prevent OTel auto-instrumentation from
# patching core modules and retrying against a dead endpoint — which adds
# latency to every DB/HTTP call and causes health-check timeouts in CI.
#
x-no-telemetry: &no-telemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: ""

services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  opensearch:
    ports:
      - "127.0.0.1:${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "127.0.0.1:${OPENSEARCH_PERF_PORT:-9600}:9600"

  minio:
    ports:
      - "127.0.0.1:${MINIO_PORT:-9900}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9901}:9001"

  profile-project-service:
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      <<: *no-telemetry

  identity-service:
    ports:
      - "127.0.0.1:4005:4005"
    environment:
      <<: *no-telemetry

  notification-service:
    ports:
      - "127.0.0.1:4010:4010"
    environment:
      <<: *no-telemetry

  search-indexer-service:
    ports:
      - "127.0.0.1:4003:4003"
    environment:
      <<: *no-telemetry

  competition-directory-service:
    ports:
      - "127.0.0.1:4002:4002"
    environment:
      <<: *no-telemetry

  script-storage-service:
    ports:
      - "127.0.0.1:4011:4011"
    environment:
      <<: *no-telemetry
      STORAGE_UPLOAD_BASE_URL: "http://localhost:${MINIO_PORT:-9900}"
      STORAGE_PUBLIC_BASE_URL: "http://localhost:${MINIO_PORT:-9900}"

  submission-tracking-service:
    ports:
      - "127.0.0.1:4004:4004"
    environment:
      <<: *no-telemetry

  feedback-exchange-service:
    ports:
      - "127.0.0.1:4006:4006"
    environment:
      <<: *no-telemetry

  ranking-service:
    ports:
      - "127.0.0.1:4007:4007"
    environment:
      <<: *no-telemetry

  coverage-marketplace-service:
    ports:
      - "127.0.0.1:4008:4008"
    environment:
      <<: *no-telemetry

  industry-portal-service:
    ports:
      - "127.0.0.1:4009:4009"
    environment:
      <<: *no-telemetry

  programs-service:
    ports:
      - "127.0.0.1:4012:4012"
    environment:
      <<: *no-telemetry

  partner-dashboard-service:
    ports:
      - "127.0.0.1:4013:4013"
    environment:
      <<: *no-telemetry

  api-gateway:
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      <<: *no-telemetry
