      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - internal

  programs-service:
    <<: *node-dev
    container_name: manifest-programs-service
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      <<: *telemetry-env
      OTEL_SERVICE_NAME: "programs-service"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      PORT: "4012"
      DATABASE_URL: "postgresql://manifest:manifest@postgres:5432/manifest"
      NOTIFICATION_SERVICE_URL: "http://notification-service:4010"
      KAFKA_BROKERS: "redpanda:9092"
    command: >
      /workspace/scripts/run-with-log.sh programs-service sh -lc "/workspace/scripts/pnpm-install-once.sh /workspace && pnpm --filter @script-manifest/programs-service dev"
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4012/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - internal

  partner-dashboard-service:
    <<: *node-dev
    container_name: manifest-partner-dashboard-service
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      <<: *telemetry-env
      OTEL_SERVICE_NAME: "partner-dashboard-service"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      PORT: "4013"
      DATABASE_URL: "postgresql://manifest:manifest@postgres:5432/manifest"
      RANKING_SERVICE_URL: "http://ranking-service:4007"
      NOTIFICATION_SERVICE_URL: "http://notification-service:4010"
      KAFKA_BROKERS: "redpanda:9092"
    command: >
      /workspace/scripts/run-with-log.sh partner-dashboard-service sh -lc "/workspace/scripts/pnpm-install-once.sh /workspace && pnpm --filter @script-manifest/partner-dashboard-service dev"
    depends_on:
      postgres:
        condition: service_healthy
      ranking-service:
        condition: service_healthy
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4013/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - internal

  api-gateway:
    <<: *node-dev
    container_name: manifest-api-gateway
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      <<: *telemetry-env
      OTEL_SERVICE_NAME: "api-gateway"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      PORT: "4000"
      IDENTITY_SERVICE_URL: "http://identity-service:4005"
      PROFILE_SERVICE_URL: "http://profile-project-service:4001"
      COMPETITION_DIRECTORY_SERVICE_URL: "http://competition-directory-service:4002"
      SUBMISSION_TRACKING_SERVICE_URL: "http://submission-tracking-service:4004"
      SCRIPT_STORAGE_SERVICE_URL: "http://script-storage-service:4011"
      FEEDBACK_EXCHANGE_SERVICE_URL: "http://feedback-exchange-service:4006"
      RANKING_SERVICE_URL: "http://ranking-service:4007"
      COVERAGE_MARKETPLACE_SERVICE_URL: "http://coverage-marketplace-service:4008"
      INDUSTRY_PORTAL_SERVICE_URL: "http://industry-portal-service:4009"
      PROGRAMS_SERVICE_URL: "http://programs-service:4012"
      PARTNER_DASHBOARD_SERVICE_URL: "http://partner-dashboard-service:4013"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-manifest}@redis:6379"
      COVERAGE_ADMIN_ALLOWLIST: "admin_01,user_admin_01"
      INDUSTRY_ADMIN_ALLOWLIST: "admin_01,user_admin_01"
      COMPETITION_ADMIN_ALLOWLIST: "admin_01,user_admin_01"
      NOTIFICATION_SERVICE_URL: "http://notification-service:4010"
      SEARCH_INDEXER_URL: "http://search-indexer-service:4003"
      RATE_LIMIT_MAX: "1000"
    command: >
      /workspace/scripts/run-with-log.sh api-gateway sh -lc "/workspace/scripts/pnpm-install-once.sh /workspace && pnpm --filter @script-manifest/api-gateway dev"
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: "Host(`api.localhost`)"
      traefik.http.routers.api.entrypoints: "web"
      traefik.http.services.api.loadbalancer.server.port: "4000"
    depends_on:
      traefik:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      profile-project-service:
        condition: service_healthy
      competition-directory-service:
        condition: service_healthy
      submission-tracking-service:
        condition: service_healthy
      feedback-exchange-service:
        condition: service_healthy
      ranking-service:
        condition: service_healthy
      coverage-marketplace-service:
        condition: service_healthy
      industry-portal-service:
        condition: service_healthy
      programs-service:
        condition: service_healthy
      partner-dashboard-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      search-indexer-service:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:4000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - public
      - internal

  writer-web:
    <<: *node-dev
    container_name: manifest-writer-web
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      <<: *telemetry-env
      SENTRY_DSN: "${SENTRY_DSN:-}"
      NEXT_PUBLIC_SENTRY_DSN: "${SENTRY_DSN:-}"
      SCRIPT_STORAGE_SERVICE_URL: "http://script-storage-service:4011"
      API_GATEWAY_URL: "http://api-gateway:4000"
      SCRIPT_UPLOAD_INTERNAL_BASE_URL: "http://minio:9000"
      WRITER_DEMO_USER_ID: "writer_01"
    command: >
      /workspace/scripts/run-with-log.sh writer-web sh -lc "/workspace/scripts/pnpm-install-once.sh /workspace && pnpm --filter @script-manifest/writer-web dev"
    labels:
      traefik.enable: "true"
      traefik.http.routers.writer.rule: "Host(`localhost`)"
      traefik.http.routers.writer.entrypoints: "web"
      traefik.http.services.writer.loadbalancer.server.port: "3000"
    depends_on:
      traefik:
        condition: service_healthy
      api-gateway:
        condition: service_started
      script-storage-service:
        condition: service_started
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:3000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - public
      - internal

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  signoz_data:
