name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: api-gateway
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: competition-directory-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: coverage-marketplace-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: feedback-exchange-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: industry-portal-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: identity-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: notification-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: programs-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: partner-dashboard-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: profile-project-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: ranking-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: script-storage-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: search-indexer-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: submission-tracking-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: writer-web
            dockerfile: infra/docker/frontend.Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/full-chaos/script-manifest/${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_NAME=${{ matrix.name }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }},ignore-error=true

      - name: Scan image with Trivy
        id: trivy-scan
        uses: aquasecurity/trivy-action@0.34.2
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ghcr.io/full-chaos/script-manifest/${{ matrix.name }}:${{ steps.meta.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF
        if: always() && steps.trivy-scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.name }}

      - name: Fail on critical/high vulnerabilities
        if: steps.trivy-scan.outcome == 'failure'
        run: |
          echo "::error::Trivy found critical/high vulnerabilities in ${{ matrix.name }}"
          exit 1
