name: Build & Push Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: api-gateway
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: competition-directory-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: coverage-marketplace-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: feedback-exchange-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: industry-portal-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: identity-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: notification-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: programs-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: partner-dashboard-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: profile-project-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: ranking-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: script-storage-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: search-indexer-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: submission-tracking-service
            dockerfile: infra/docker/service.Dockerfile
            context: .
          - name: writer-web
            dockerfile: infra/docker/frontend.Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/full-chaos/script-manifest/${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_NAME=${{ matrix.name }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }},ignore-error=true

      - name: Scan image with Trivy
        id: trivy-scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ghcr.io/full-chaos/script-manifest/${{ matrix.name }}:${{ steps.meta.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF
        if: always() && steps.trivy-scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.name }}

      - name: Fail on critical/high vulnerabilities
        if: steps.trivy-scan.outcome == 'failure'
        run: |
          echo "::error::Trivy found critical/high vulnerabilities in ${{ matrix.name }}"
          exit 1
