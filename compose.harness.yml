      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  coverage-marketplace-service:
    ports:
      - "127.0.0.1:4008:4008"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  industry-portal-service:
    ports:
      - "127.0.0.1:4009:4009"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  programs-service:
    ports:
      - "127.0.0.1:4012:4012"
    environment:
      <<: *no-telemetry
    healthcheck:
      <<: *no-healthcheck
    depends_on:
      postgres:
        condition: service_healthy

  partner-dashboard-service:
    ports:
      - "127.0.0.1:4013:4013"
