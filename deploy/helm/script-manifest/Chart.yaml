apiVersion: v2
name: script-manifest
description: Writer-first platform — umbrella Helm chart
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  # Local subcharts (in charts/ directory)
  - name: notification-service
    version: "0.1.0"
    condition: notification-service.enabled
